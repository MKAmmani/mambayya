<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mambaya House — Mobile Preview</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
    body { font-family: 'Work Sans', sans-serif; background:#f6faff; color:#151c22; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="antialiased">
    <main class="min-h-screen flex items-center justify-center bg-cover bg-center" style="background-image:url('admin.png')">
        <div class="w-full px-6 py-24 bg-black/40">
            <div class="max-w-md mx-auto text-center text-white">
                <h1 class="text-4xl font-bold mb-2">MAMBAYYA HOUSE</h1>
                <p class="italic mb-6">Where Knowledge meets Democratic purpose</p>
                <p class="mb-6 text-sm">Dedicated to the advancement of democratic values, scholarly research, and the preservation of Nigeria's political history.</p>
            </div>
        </div>
        <!-- Centered controls for small screens -->
        <div class="absolute left-1/2 -translate-x-1/2 bottom-6 w-[92%] max-w-[500px] z-20">
            <div class="grid grid-cols-1 gap-3">
                <div class="flex items-center justify-between bg-[#E5E5E5] text-black px-4 py-3 rounded-lg w-full cursor-pointer shadow-md">
                    <span class="text-base font-medium">Search</span>
                    <span class="material-symbols-outlined text-gray-600">expand_more</span>
                </div>
                <button class="bg-[#009EE2] text-white px-6 py-3 rounded-md font-bold text-lg whitespace-nowrap hover:bg-[#007cb3] transition-all active:scale-95">
                    Portal Login
                </button>
            </div>
        </div>
    </main>
</body>
</html>
